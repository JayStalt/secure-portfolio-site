{% extends "base.html" %}
{% block title %}Manage Projects{% endblock %}

{% block content %}
<h2>Manage Projects</h2>

<table border="1" cellpadding="8" cellspacing="0">
    <thead>
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for project in projects %}
        <tr>
            <td>{{ project.title }}</td>
            <td>{{ project.category }}</td>
            <td>{{ project.display_order }}</td>
            <td>
                <a href="{{ url_for('main.edit_project', project_id=project.id) }}">Edit</a> |
                <a href="{{ url_for('main.delete_project', project_id=project.id) }}" onclick="return confirm('Delete this project?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
